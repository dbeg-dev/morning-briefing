name: Morning Briefing

on:
  schedule:
    - cron: '0 12 * * *'  # 8:00 AM EDT (UTC-4, Apr–Oct); change to '0 13 * * *' Nov–Mar (EST)
  workflow_dispatch:       # allow manual trigger for testing

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic google-api-python-client google-auth msal requests

      - name: Generate briefing
        run: python scripts/generate_briefing.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Google Calendar — service account JSON; share your calendar with the service account email
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_CALENDAR_ID: ${{ secrets.GOOGLE_CALENDAR_ID }}
          # Gmail — OAuth2 refresh token for reading unread emails
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          # Outlook / Microsoft 365 — Azure AD app with Calendars.Read + Mail.Read permissions
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
          MS_CLIENT_SECRET: ${{ secrets.MS_CLIENT_SECRET }}
          MS_TENANT_ID: ${{ secrets.MS_TENANT_ID }}
          MS_USER_EMAIL: ${{ secrets.MS_USER_EMAIL }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sms.html
          git diff --staged --quiet || git commit -m "Morning briefing: $(TZ=America/New_York date +'%A, %B %-d, %Y')"
          git push
